# .github/workflows/terraform.yml

name: 'Terraform CI/CD'

on:
  push:
    branches:
      - main  # 1. 'main' 브랜치에 푸시될 때만 실행
    paths:
      - 'terraform/**' # 2. 'terraform/' 폴더가 변경됐을 때만
  
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**' # 3. 'main'으로 PR 올릴 때도 실행 (plan만)

# (중요) 동시에 여러 CI/CD가 실행되는 것을 막음
concurrency: terraform-deploy

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    # 테라폼 코드가 있는 디렉토리 지정
    defaults:
      run:
        working-directory: ./terraform 

    # OIDC를 위한 권한 설정 (필수)
    permissions:
      id-token: write
      contents: read
      pull-requests: write # (PR에 plan 결과 댓글 달기용)

    steps:
      - name: Checkout (코드 가져오기)
        uses: actions/checkout@v4

      - name: AWS OIDC Role 로그인
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # 2단계에서 GitHub Secret에 등록한 이름
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }} 
          aws-region: ap-northeast-2

      - name: Terraform 설치 (Setup Terraform)
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (초기화)
        # S3 백엔드에 연결
        run: terraform init

      - name: Terraform Validate (문법 검사)
        run: terraform validate

      - name: Terraform Plan (실행 계획)
        # PR일 때는 'plan'만 실행하고 댓글 남김
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -out=tfplan
        # (PR 댓글 기능은 'github-script'를 써서 추가 가능)

      - name: Terraform Apply (실제 배포)
        # 'main' 브랜치로 'push'됐을 때만 실행
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: terraform apply -auto-approve